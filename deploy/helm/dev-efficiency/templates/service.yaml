apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-efficiency.fullname" . }}
  labels:
    {{- include "dev-efficiency.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dev-efficiency.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
